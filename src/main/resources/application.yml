server:
  port: 8080

spring:
  application:
    name: teaching-sys-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:teaching_sys}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:teaching_user}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

teaching:
  upload-dir: ${TEACHING_UPLOAD_DIR:data/uploads}
  ai:
    provider: ${TEACHING_AI_PROVIDER:mock}
    base-url: ${TEACHING_AI_BASE_URL:https://api.deepseek.com}
    api-key: ${TEACHING_AI_API_KEY:}
    api-key-file: ${TEACHING_AI_API_KEY_FILE:docs/deepseekApi.txt}
    model: ${TEACHING_AI_MODEL:deepseek-v4-flash}
    timeout-ms: ${TEACHING_AI_TIMEOUT_MS:30000}
    fallback-enabled: ${TEACHING_AI_FALLBACK_ENABLED:true}
    stream-enabled: ${TEACHING_AI_STREAM_ENABLED:true}
  homework-upload:
    max-size-mb: ${TEACHING_HOMEWORK_UPLOAD_MAX_SIZE_MB:50}
